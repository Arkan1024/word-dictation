server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 关键配置：让 /words 目录支持自动返回文件列表 JSON
    location /words/ {
        root /usr/share/nginx/html;
        autoindex on;
        autoindex_format json; # 以 JSON 格式输出文件列表
        autoindex_exact_size off;
        autoindex_localtime on;
    }
}
